name: publish
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # OIDC Trusted Publishing + provenance no npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node 24 (LTS ativo) ja traz npm >= 11.5.1, requisito do OIDC Trusted Publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Verificar npm >= 11.5.1 (minimo do OIDC)
        run: npm --version
      - run: npm ci
      # Gates de qualidade ANTES de publicar (política do próprio MGR)
      - run: node bin/mgr.js validate
      - run: npm test
      # Confere que a tag bate com a versão do package.json
      - name: Verificar tag == versão
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r '.version' package.json)
          [ "$TAG" = "$PKG" ] || { echo "tag v$TAG != package.json $PKG"; exit 1; }
      # prepack roda o build minificado automaticamente.
      # Auth via OIDC (Trusted Publisher) - sem token. Provenance automatica.
      - run: npm publish --provenance --access public
