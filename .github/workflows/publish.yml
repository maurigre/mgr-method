name: publish
on:
  push:
    tags: ["v*"]

# NOTA: a publicacao no npm e MANUAL por ora. Os dois caminhos automatizados
# estao bloqueados por bugs do lado do npm:
#   - OIDC Trusted Publishing: token exchange retorna "package not found" (npm/cli#8730)
#   - Granular token com bypass_2fa: registry retorna E403 (npm/cli#8869)
# A conta usa 2FA por passkey (npm removeu TOTP), entao o publish manual usa recovery code.
# Quando o npm corrigir os bugs, reativar o passo de publish (ver historico do git).

permissions:
  contents: read

jobs:
  release-gates:
    runs-on: ubuntu-latest
    steps:
      # v5 e o primeiro major destas actions que roda em node24; a v4 (node20) esta deprecada.
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      # Gates de qualidade da tag de release (política do próprio MGR)
      - run: node bin/mgr.js validate
      - run: npm test
      # Confere que a tag bate com a versão do package.json
      - name: Verificar tag == versão
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r '.version' package.json)
          [ "$TAG" = "$PKG" ] || { echo "tag v$TAG != package.json $PKG"; exit 1; }
      - name: Instrucoes de publicacao manual
        run: |
          echo "Gates OK para ${GITHUB_REF_NAME}."
          echo "Publique manualmente (2FA passkey -> recovery code no --otp):"
          echo "  npm publish --access public --otp=<recovery-code>"
