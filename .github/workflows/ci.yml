name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # LTS mais recente; o reporter lcov do node:test (cobertura) exige >= 22, atendido pelo LTS atual.
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: node bin/mgr.js validate
      - run: npm run coverage
      - name: Enviar cobertura ao Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: lcov.info
