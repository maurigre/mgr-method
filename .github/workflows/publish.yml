name: publish
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # provenance (atestado de origem) no npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # Trusted Publishing (OIDC) exige npm >= 11.5.1; o npm que vem no Node 22 e mais antigo
      - name: Atualizar npm para versao com suporte a OIDC
        run: npm install -g npm@latest
      - run: npm ci
      # Gates de qualidade ANTES de publicar (política do próprio MGR)
      - run: node bin/mgr.js validate
      - run: npm test
      # Confere que a tag bate com a versão do package.json
      - name: Verificar tag == versão
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r '.version' package.json)
          [ "$TAG" = "$PKG" ] || { echo "tag v$TAG != package.json $PKG"; exit 1; }
      # prepack roda o build minificado automaticamente.
      # Sem NODE_AUTH_TOKEN: auth via OIDC (Trusted Publisher). Provenance e automatica.
      - run: npm publish --access public
